<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Molly Chen · Octave Product Portfolio</title>

    <!-- Template stylesheets -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/templatemo-blue.css" />
    <link rel="stylesheet" href="css/custom.css" />

    <!-- Google Font as Proxima substitute -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="portfolio-page">
    <!-- header section -->
    <header>
      <div class="container">
        <div class="row">
          <div class="col-md-12 col-sm-12">
            <img
              src="images/headshot.jpg"
              class="img-responsive img-circle tm-border"
              alt="templatemo easy profile"
            />
            <br /><br />
            <h1 class="tm-title bold shadow accent">Molly Chen</h1>
            <h1 class="white bold shadow">Technical Product Manager</h1>
          </div>
        </div>
      </div>
    </header>

    <!-- primary site nav -->
    <div class="top-nav-stack">
      <nav class="site-nav" aria-label="Primary">
        <div class="container">
          <div class="row">
            <div class="col-xs-12">
              <div class="site-nav-inner round">
                <ul class="site-nav-list">
                  <li><a href="index.html#experiences">Experiences</a></li>
                  <li class="site-nav-dropdown-wrap">
                    <a
                      href="#"
                      class="site-nav-dropdown-trigger"
                      id="portfolioMenuTrigger"
                      aria-expanded="false"
                      aria-haspopup="true"
                      aria-controls="portfolioSubmenu"
                      >Portfolio</a
                    >
                    <ul
                      class="site-nav-dropdown"
                      id="portfolioSubmenu"
                      role="menu"
                      aria-labelledby="portfolioMenuTrigger"
                    >
                      <li role="none">
                        <a href="#" role="menuitem" data-tab="consumer-apps"
                          >Consumer Apps</a
                        >
                      </li>
                      <li role="none">
                        <a href="#" role="menuitem" data-tab="completed"
                          >Business Integrations</a
                        >
                      </li>
                    </ul>
                  </li>
                  <li><a href="index.html#experiences">Skills</a></li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </div>

    <!-- ══ CONSUMER APPS ══ -->
    <div id="tab-consumer-apps" class="portfolio-section consumer-apps">
      <section class="experience">
        <div class="container">
          <div class="row">
            <div class="col-xs-12">
              <div class="section-header">
                <h2><i class="fa fa-bolt"></i> Consumer Apps</h2>
                <span class="section-count">8 initiatives &nbsp;·&nbsp; </span>
              </div>

              <div class="consumer-apps-work-grid">
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- ══ BUSINESS INTEGRATIONS ══ -->
    <div id="tab-completed" class="portfolio-section">
      <section class="about">
        <div class="container">
          <div class="row">
            <div class="col-xs-12">
              <div class="section-header">
                <h2>
                  <i class="fa fa-check-circle" style="color: #3366cc"></i>
                  Business Integrations
                </h2>
                <span class="section-count">12 initiatives</span>
              </div>

              <div class="business-integrations-grid">
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- footer section -->
    <footer>
      <div class="container">
        <div class="row">
          <div class="col-md-12 col-sm-12">
            <p>Copyright &copy; 2026 Molly Chen</p>
            <ul class="social-icons">
              <li>
                <a
                  href="images/resume.pdf"
                  target="_blank"
                  class="fa fa-file"
                ></a>
              </li>
              <li>
                <a
                  href="https://www.linkedin.com/in/mollymolichen/"
                  target="_blank"
                  class="fa fa-linkedin"
                ></a>
              </li>
              <li>
                <a
                  href="https://github.com/mollymolichen"
                  target="_blank"
                  class="fa fa-github"
                ></a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </footer>

    <!-- javascript js -->
    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.backstretch.min.js"></script>
    <script src="js/portfolio-db.js"></script>
    <script src="js/portfolio-ui.js"></script>
    <script src="js/custom.js"></script>
  </body>
</html>
