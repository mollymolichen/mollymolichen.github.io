<!doctype html>

  <body class="portfolio-page project-page">

    </header>

    <div class="top-nav-stack">
      <nav class="site-nav" aria-label="Primary">
        <div class="container">
          <div class="row">
            <div class="col-xs-12">
              <div class="site-nav-inner round">
                <ul class="site-nav-list">
                  <li><a href="index.html#experiences">Experiences</a></li>
                  <li class="site-nav-dropdown-wrap">
                    <a
                      href="#"
                      class="site-nav-dropdown-trigger"
                      id="portfolioMenuTrigger"

                        <a
                          href="portfolio.html?tab=consumer-apps"

                      <li role="none">
                        <a

                  </li>

                </ul>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </div>

    <div class="project-detail-page">
      <section class="about project-detail-section">
        <div class="container">
          <div class="row">
            <div class="col-xs-12">
              <div id="project-content">
                <p style="color: #888; margin-top: 8px">Loading…</p>

    <footer>
      <div class="container">
        <div class="row">
          <div class="col-md-12 col-sm-12">

            <ul class="social-icons">
              <li>
                <a
                  href="images/resume.pdf"

                  class="fa fa-file"

              </li>
              <li>
                <a
                  href="https://www.linkedin.com/in/mollymolichen/"

                ></a>
              </li>
              <li>
                <a
                  href="https://github.com/mollymolichen"
                  target="_blank"

            </ul>

    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.backstretch.min.js"></script>
    <script src="js/portfolio-db.js"></script>
    <script src="js/custom.js"></script>
    <script>
      (function () {
        function slugify(str) {
          return str
            .toLowerCase()
            .replace(/[—–]/g, "-")
            .replace(/[^a-z0-9\s-]/g, "")
            .replace(/\s+/g, "-")
            .replace(/-+/g, "-")
            .replace(/^-|-$/g, "");
        }

        function fieldBlock(label, iconClass, htmlValue) {
          var wrap = document.createElement("div");
          wrap.className = "project-field";
          var lab = document.createElement("div");
          lab.className = "prd-field-label";
          var icon = document.createElement("i");
          icon.className = "fa " + iconClass;
          lab.appendChild(icon);
          lab.appendChild(document.createTextNode(" " + label));
          var val = document.createElement("div");
          val.className = "prd-field-value";
          val.innerHTML = htmlValue;
          wrap.appendChild(lab);
          wrap.appendChild(val);
          return wrap;
        }

        function render(card, section) {
          document.title = card.title + " · Molly Chen";
          var content = document.getElementById("project-content");
          content.innerHTML = "";

          var backLink = document.createElement("a");
          backLink.href = "portfolio.html?tab=" + section.tabId;
          backLink.className = "project-back-link";
          backLink.textContent = "← Portfolio";
          content.appendChild(backLink);

          var statusRow = document.createElement("div");
          statusRow.className = "project-status-row";
          var sectionBadge = document.createElement("span");
          sectionBadge.className = "project-section-badge";
          sectionBadge.textContent = section.title;
          statusRow.appendChild(sectionBadge);
          if (card.status) {
            var pill = document.createElement("span");
            pill.className = "status-pill";
            pill.textContent = card.status.label || "";
            statusRow.appendChild(pill);
          }
          content.appendChild(statusRow);

          var titleEl = document.createElement("h1");
          titleEl.className = "project-title";
          titleEl.textContent = card.title;
          content.appendChild(titleEl);

          if (card.previewUrl) {
            var preview = document.createElement("div");
            preview.className = "prd-card-preview project-preview";
            var iframe = document.createElement("iframe");
            iframe.src = card.previewUrl;
            iframe.loading = "lazy";
            iframe.setAttribute(
              "sandbox",
              "allow-scripts allow-same-origin allow-forms",
            );
            iframe.title = card.title + " preview";
            iframe.setAttribute("referrerpolicy", "no-referrer");
            preview.appendChild(iframe);
            var cta = document.createElement("a");
            cta.href = card.previewUrl;
            cta.target = "_blank";
            cta.rel = "noopener noreferrer";
            cta.className = "prd-card-preview-cta";
            cta.textContent = "View Live →";
            preview.appendChild(cta);
            content.appendChild(preview);
          }

          var fields = document.createElement("div");
          fields.className = "project-fields";
          fields.appendChild(
            fieldBlock("Problem", "fa-exclamation-circle", card.problem || ""),
          );
          fields.appendChild(
            fieldBlock("Metrics", "fa-line-chart", card.metrics || ""),
          );
          fields.appendChild(
            fieldBlock("Solution", "fa-lightbulb-o", card.solution || ""),
          );
          content.appendChild(fields);
        }

        function init() {
          var params = new URLSearchParams(window.location.search);
          var id = params.get("id");
          var content = document.getElementById("project-content");
          if (!id) {
            content.innerHTML = "<p>No project specified.</p>";
            return;
          }
          if (typeof loadPortfolioPayload !== "function") return;
          loadPortfolioPayload()
            .then(function (payload) {
              var data = payload.data;
              var foundCard = null;
              var foundSection = null;
              (data.sections || []).forEach(function (section) {
                (section.cards || []).forEach(function (card) {
                  if (slugify(card.title) === id) {
                    foundCard = card;
                    foundSection = section;
                  }
                });
              });
              if (!foundCard) {
                content.innerHTML = "<p>Project not found.</p>";
                return;
              }
              render(foundCard, foundSection);
            })
            .catch(function () {
              content.innerHTML = "<p>Failed to load project data.</p>";
            });
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", init);
        } else {
          init();
        }
      })();
    </script>
  </body>
</html>
